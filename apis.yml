    url: https://developer.yodlee.com/products/yodlee/account-aggregation/docs/api-reference
- aid: yodlee:yodlee-fastlink
  name: Yodlee FastLink
  description: FastLink 4 is Yodlee's white-label account aggregation widget that enables users to securely link their financial
    accounts. Provides a customizable embedded UI for account login, MFA, account selection, verification, and consent management.
  humanURL: https://developer.yodlee.com/
