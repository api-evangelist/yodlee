specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Yodlee
providerId: yodlee
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial Data
  - Data Aggregation
  - Rate Limiting
description: |
  Yodlee does not publish per-second / per-minute API rate limits on its public
  developer pages. Throttling is enforced per cobrand / customer and is communicated
  through the customer's signed agreement and account team rather than docs.
sources:
  - https://www.yodlee.com/products
  - https://developer.yodlee.com/
responseCodes:
  throttled: 429
limits:
  - name: Per-cobrand throttling (undocumented)
    scope: account
    metric: varies
    limit: see Yodlee customer agreement
    notes: Limits depend on cobrand tier, data-provider mix, and refresh policy.
policies:
  - name: Cobrand-scoped enforcement
    description: Rate limits and refresh quotas are scoped per cobrand identifier rather
      than per individual API key.
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on 429 / 5xx
      responses.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
