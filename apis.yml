aid: yodlee
name: Yodlee
description: Yodlee (Envestnet | Yodlee) is a financial data aggregation platform
  providing unified API access to bank accounts, credit card transactions, investments,
  loans, and insurance data across thousands of financial institutions. The Yodlee
  Core APIs v1.1 enable secure account aggregation, transaction enrichment, risk analytics,
  consent management, and account verification for fintech applications.
