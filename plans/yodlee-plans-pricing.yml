specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Yodlee
providerId: yodlee
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Financial Data
  - Data Aggregation
  - Open Banking
  - Wealth
description: |
  Yodlee (Envestnet | Yodlee) is a B2B financial-data aggregator. Pricing for
  FastLink, Aggregation, Verification, Transactions, and Investment Account APIs is
  not published; commercial terms are negotiated with Yodlee Sales and depend on
  data partners, geographies, account counts, and refresh frequency.
sources:
  - https://www.yodlee.com/products
  - https://developer.yodlee.com/
notes: |
  WebFetch of yodlee.com confirmed no public pricing — the site routes prospects to
  "Get Started" / "Request a demo" forms. The legacy /pricing path returns 404.
  Treated as B2B contact-sales.
plans:
  - id: yodlee-contact-sales
    name: Contact Sales
    type: enterprise
    description: All Yodlee API commercial terms are quoted via Yodlee Sales; no
      self-serve price tier is published.
    entries:
      - label: Custom Commercial Terms
        name: custom
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: FastLink consent / aggregation
      - name: Verification (Account / Income)
      - name: Transactions enrichment
      - name: Investment account data
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
