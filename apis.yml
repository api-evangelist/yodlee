- aid: yodlee:yodlee-account-verification-api
  name: Yodlee Account Verification API
  description: The Yodlee Account Verification API enables real-time verification
    of bank account ownership and balance. Supports verification workflows via FastLink
    4, holder profile retrieval, verified account status, and account classification
    summaries.
  humanURL: https://developer.yodlee.com/products/yodlee/account-aggregation/docs/api-reference
  baseURL: https://production.api.yodlee.com/ysl
  tags:
  - Account Verification
  - Banking
  - Fintech
  - KYC
  properties:
  - type: Documentation
    url: https://developer.yodlee.com/products/yodlee/account-aggregation/docs/api-reference
- aid: yodlee:yodlee-fastlink
  name: Yodlee FastLink
  description: FastLink 4 is Yodlee's white-label account aggregation widget that
    enables users to securely link their financial accounts. Provides a customizable
    embedded UI for account login, MFA, account selection, verification, and consent
    management.
  humanURL: https://developer.yodlee.com/
  tags:
  - Account Linking
  - Widget
  - Embedded Finance
  properties:
