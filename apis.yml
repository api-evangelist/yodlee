- aid: yodlee:yodlee-account-verification-api
  name: Yodlee Account Verification API
  description: The Yodlee Account Verification API enables real-time verification of bank account ownership and balance. Supports
    verification workflows via FastLink 4, holder profile retrieval, verified account status, and account classification summaries.
  humanURL: https://developer.yodlee.com/products/yodlee/account-aggregation/docs/api-reference
  baseURL: https://production.api.yodlee.com/ysl
  tags:
