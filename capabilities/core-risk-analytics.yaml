naftiko: 1.0.0-alpha2
info:
  label: Yodlee Core APIs — Risk Analytics
  description: 'Yodlee Core APIs — Risk Analytics. 1 operations. Lead operation: Risk Analytics. Self-contained Naftiko capability
    covering one Yodlee business surface.'
  tags:
  - Yodlee
  - Risk Analytics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YODLEE_API_KEY: YODLEE_API_KEY
capability:
  consumes:
  - type: http
    namespace: core-risk-analytics
    baseUri: ''
    description: Yodlee Core APIs — Risk Analytics business capability. Self-contained, no shared references.
    resources:
    - name: riskAnalytics
      path: /riskAnalytics
      operations:
      - name: riskanalytics
        method: GET
        description: Risk Analytics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accountId
          in: query
          type: string
          description: accountId
          required: true
  exposes:
  - type: rest
    namespace: core-risk-analytics-rest
    port: 8080
    description: REST adapter for Yodlee Core APIs — Risk Analytics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/riskanalytics
      name: riskanalytics
      description: REST surface for riskAnalytics.
      operations:
      - method: GET
        name: riskanalytics
        description: Risk Analytics
        call: core-risk-analytics.riskanalytics
        with:
          accountId: rest.accountId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-risk-analytics-mcp
    port: 9090
    transport: http
    description: MCP adapter for Yodlee Core APIs — Risk Analytics. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: risk-analytics
      description: Risk Analytics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-risk-analytics.riskanalytics
      with:
        accountId: tools.accountId
      outputParameters:
      - type: object
        mapping: $.
