apis:
- aid: yodlee:yodlee-core-api
  name: Yodlee Core API
  description: The Yodlee Core APIs v1.1 provide a flexible RESTful API for accessing
    personal financial data. Key capabilities include account aggregation across banks
    and brokerages, transaction history and enrichment, holdings and investment data,
    consent and provider account management, documents, statements, data extracts,
    risk analytics, and account verification. Supports 90% of top US, UK, Australia,
    and India financial institutions.
  humanURL: https://developer.yodlee.com/resources/yodlee/yodlee-api-overview/docs/overview
  baseURL: https://production.api.yodlee.com/ysl
  tags:
