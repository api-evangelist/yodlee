description: |
  Yodlee's commercial model is a sales-negotiated B2B contract; this artifact is a
  Contact Sales placeholder pending the customer's master agreement.
sources:
  - https://www.yodlee.com/products
notes: |
  Yodlee does not publish per-meter pricing publicly. Meter and FOCUS column values
  below are minimal placeholders pending the signed Yodlee data-services agreement.
billingModel:
  pricingCategory: Contact Sales
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Yodlee
  ServiceCategory: Financial Data Aggregation
  ProviderName: Yodlee
  PublisherName: Yodlee, Inc.
  InvoiceIssuerName: Yodlee, Inc.
  BillingCurrency: USD
meters:
  - name: linked_accounts
    description: Aggregated end-user financial accounts under the cobrand; commonly the
      primary commercial unit on Yodlee invoices.
    unit: account
    aggregation: count
  - name: api_calls
    description: API call volume (FastLink / Aggregation / Verification / Transactions);
      priced per the cobrand agreement.
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Visibility comes from cobrand-level reports issued by the Yodlee account
      team rather than a self-serve usage API.
  - name: Allocation
    description: Allocate Yodlee spend by cobrand identifier and by downstream product /
      use case (origination, verification, PFM).
  - name: Optimization
    description: Optimize via refresh-cadence policy, MFA / OAuth coverage, and pruning
      stale linked accounts to reduce billable account counts.
  - name: Accountability
    description: Spend ownership sits with the data / risk / lending product owner who
      signed the Yodlee master agreement.
maintainers:
